{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Hôtel Citadel{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'app.css' %}">
</head>
<body>

<header class="navbar">
  <div class="nav-inner">
    <a href="{% url 'facture_liste' %}" class="brand">🏨 Hôtel Citadel</a>
    <nav>
      <a href="{% url 'facture_liste' %}">Factures</a>
      <a href="{% url 'facture_create' %}">+ Nouvelle facture</a>
      <a href="/admin/" target="_blank">Admin</a>
    </nav>
  </div>
</header>

<main class="container">
  {% if messages %}
    <div class="messages">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <small>Hôtel Citadel — Gestion locale des factures</small>
</footer>

</body>
</html>
